name: Main

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  static:
    name: Static layer
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '24'
      - name: Cache dependencies
        uses: actions/cache@v5
        with:
          path: |
            ~/.npm
            ~/.cache/ms-playwright
          key: ${{ runner.os }}-deps-${{ hashFiles('package-lock.json') }}-playwright-${{ hashFiles('playwright.config.ts') }}
      - name: Install dependencies
        run: npm ci --ignore-scripts
      - name: Lint
        run: npm run lint
      - name: Typecheck
        run: npm run typecheck
      # - name: Dead code
      #   run: npm run knip
      # - name: Install gitleaks
      #   run: |
      #     curl -sSL https://github.com/gitleaks/gitleaks/releases/download/v8.30.1/gitleaks_8.30.1_linux_x64.tar.gz \
      #       | tar -xz -C /tmp gitleaks
      #     sudo install /tmp/gitleaks /usr/local/bin/gitleaks
      #     gitleaks version
      # - name: Secret scan
      #   run: gitleaks dir . --redact --config .gitleaks.toml

  unit:
    name: Unit tests
    runs-on: ubuntu-latest
    needs: static
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '24'
      - name: Cache dependencies
        uses: actions/cache@v5
        with:
          path: |
            ~/.npm
            ~/.cache/ms-playwright
          key: ${{ runner.os }}-deps-${{ hashFiles('package-lock.json') }}-playwright-${{ hashFiles('playwright.config.ts') }}
      - name: Install dependencies
        run: npm ci --ignore-scripts
      - name: Run Vitest
        run: npm run test:unit

  end-to-end:
    name: End-to-end tests
    runs-on: ubuntu-latest
    needs: static
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '24'
      - name: Cache dependencies
        uses: actions/cache@v5
        with:
          path: |
            ~/.npm
            ~/.cache/ms-playwright
          key: ${{ runner.os }}-deps-${{ hashFiles('package-lock.json') }}-playwright-${{ hashFiles('playwright.config.ts') }}
      - name: Install dependencies
        run: npm ci --ignore-scripts
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
      - name: Create .env for preview server
        run: |
          # ORIGIN sets Better Auth's baseURL and must match the host the
          # preview server is served on (see webServer.url in playwright.config.ts).
          # BETTER_AUTH_SECRET is generated fresh per run: Better Auth refuses to
          # boot in production/preview mode with the default secret. The CI database
          # is an ephemeral throwaway, so this secret protects nothing real.
          cat > .env <<EOF
          DATABASE_URL=file:./ci.db
          OPEN_LIBRARY_BASE_URL=https://openlibrary.org
          ORIGIN=http://127.0.0.1:4173
          BETTER_AUTH_SECRET=$(openssl rand -hex 32)
          ENABLE_TEST_SEED=true
          EOF
      - name: Push database schema
        # `npm ci --ignore-scripts` skips the `prepare` script, so db:push (which
        # creates the SQLite schema) never runs. Push it explicitly against ci.db
        # before the preview server starts, or every page 500s on a missing table.
        run: npm run db:push
      - name: Run Playwright
        run: npm run test
      - name: Generate failure dossier
        if: failure()
        run: npm run dossier
      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
      - name: Upload failure dossier
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: failure-dossier
          path: playwright-report/dossier.md
          retention-days: 7
